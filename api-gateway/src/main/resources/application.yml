server:
  port: 8085

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  redis:
    host: localhost
    port: 6379

  cloud:
    gateway:
      routes:
        - id: payment-engine
          uri: http://localhost:8080
          predicates:
            - Path=/pay/**

management:
  endpoints:
    web:
      exposure:
        include: health,info